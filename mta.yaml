_schema-version: '3.1'
ID: incident-analyzer
version: 1.0.0
description: AI-Powered Incident Analyzer

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  # ---------- SERVER MODULE ----------
  - name: incident-analyzer-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: incident-analyzer-db
      - name: incident-analyzer-auth
      - name: gemini-api

  # ---------- DATABASE DEPLOYER ----------
  - name: incident-analyzer-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    requires:
      - name: incident-analyzer-db

  # ---------- APP ROUTER (UI) ----------
  - name: incident-analyzer-app
    type: approuter.nodejs
    path: app/router
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: incident-analyzer-auth

resources:
  # ---------- HANA HDI CONTAINER ----------
  - name: incident-analyzer-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # ---------- XSUAA ----------
  - name: incident-analyzer-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

  # ---------- USER-PROVIDED SERVICE (Gemini API Key) ----------
  - name: gemini-api
    type: org.cloudfoundry.existing-service
